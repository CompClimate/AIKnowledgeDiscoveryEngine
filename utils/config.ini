[DATASET]
features = ['sosaline', 'somxl010', 'sohefldo', 'vozocrtx_ml', 'vomecrty_ml', 'sowsc', 'bathy', 'coriolis', 'amo', 'pdo', 'sam', 'oni', 'nao']
concepts = ['voep', 'vori', 'von2', 'vos2', 'vohfe', 'vovort']
labels = ['vomlhc_anomaly'] #['vomlhc']
members = ['opa0', 'opa1', 'opa2', 'opa3', 'opa4']
location = /quobyte/maikesgrp/sanah/na_crop_latest
context_window = 6
offset = [1, 3, 6]
start = 1979-01
end = 2018-01
batch_size = 64
smooth_features = ['sohefldo', 'vozocrtx_ml', 'vomecrty_ml', 'sowsc']
smooth_concepts = ['voep', 'vori', 'von2', 'vos2', 'vohfe', 'vovort']
